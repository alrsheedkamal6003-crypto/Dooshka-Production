<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة البيان | الكتب والمذكرات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* إعدادات عامة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary-color: #2c3e50;
            --secondary-color: #e74c3c;
            --bg-color: #f4f6f8;
            --text-color: #333;
            --card-bg: #ffffff;
            --white: #ffffff;
            --border-color: #eee;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 🌗 تخصيص الوضع الداكن الفاخر */
        body.dark-theme {
            --bg-color: #131c24;
            --text-color: #f5f6fa;
            --card-bg: #1e2b35;
            --primary-color: #1a252f;
            --white: #1e2b35;
            --border-color: #2c3e50;
        }

        /* 🎬 1. الشاشة الترحيبية المتحركة (Splash Screen) */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        .splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .splash-content {
            text-align: center;
            color: white;
        }
        .splash-logo {
            font-size: 80px;
            color: var(--secondary-color);
            animation: pulseGlow 1.5s infinite alternate;
        }
        .splash-title {
            font-size: 36px;
            font-weight: 900;
            margin-top: 20px;
        }
        .splash-loader {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            margin: 25px auto 0;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }
        .splash-loader::after {
            content: '';
            position: absolute;
            left: -50%;
            top: 0;
            height: 100%;
            width: 50%;
            background: var(--secondary-color);
            animation: loadingBar 1.5s infinite ease-in-out;
        }

        /* شريط التنقل (Navbar) المصغر */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background-color 0.3s;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        .logo:hover {
            color: var(--secondary-color);
        }

        /* حاوية التحكم العلوية بالأزرار التفاعلية */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 🌐 زر الترجمة الفوري المطور والمضيء */
        .lang-toggle {
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .lang-toggle:hover {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }

        /* زر الوضع الداكن الفخم */
        .theme-toggle {
            font-size: 22px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            align-items: center;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            color: var(--secondary-color);
        }

        /* سلة المشتريات العائمة والتفاعلية */
        .cart-icon {
            position: relative;
            font-size: 24px;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
        }
        .cart-icon:hover {
            transform: scale(1.1);
            color: var(--secondary-color);
        }

        .cart-count {
            position: absolute;
            top: -10px;
            right: -15px;
            background-color: var(--secondary-color);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-count.bump {
            transform: scale(1.5);
        }

        /* رأس القسم (Category Header) */
        .category-header {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: white;
            padding: 40px 5%;
            text-align: center;
            margin-bottom: 30px;
            transition: background 0.3s;
        }

        .category-header h1 {
            font-size: 36px;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        .category-header p {
            font-size: 16px;
            line-height: 1.6;
        }

        /* شريط البحث والفلترة */
        .controls {
            display: flex;
            justify-content: center;
            padding: 0 5%;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }
        body.dark-theme .search-box {
            background: var(--card-bg);
        }
        .search-box:focus-within {
            border-color: var(--secondary-color);
        }

        .search-box input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            color: var(--text-color);
        }

        .search-box button {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #c0392b;
        }

        /* شبكة المنتجات (Products Grid) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            padding: 0 5% 60px;
        }

        /* كارت المنتج */
        .product-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .product-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            line-height: 1.4;
            transition: color 0.3s;
        }
        body.dark-theme .product-title {
            color: var(--text-color);
        }

        .product-price {
            font-size: 22px;
            color: var(--secondary-color);
            font-weight: 900;
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        body.dark-theme .add-to-cart-btn {
            color: #fff;
            border-color: #fff;
        }

        .product-card:hover .add-to-cart-btn {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: scale(1.03);
        }
        body.dark-theme .product-card:hover .add-to-cart-btn {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        /* نافذة السلة الجانبية المتطورة (Cart Drawer) */
        .cart-drawer {
            position: fixed;
            top: 0;
            left: -400px;
            width: 380px;
            height: 100vh;
            background-color: var(--white);
            z-index: 2000;
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
        }
        html[dir="ltr"] .cart-drawer {
            left: auto;
            right: -400px;
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .cart-drawer.open {
            left: 0;
        }
        html[dir="ltr"] .cart-drawer.open {
            right: 0;
            left: auto;
        }
        .cart-drawer-header {
            padding: 20px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-drawer-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .close-cart {
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-cart:hover {
            color: var(--secondary-color);
        }
        .cart-drawer-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        body.dark-theme .cart-item { border-bottom-color: #2c3e50; }
        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-title {
            font-weight: 700;
            font-size: 15px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        body.dark-theme .cart-item-title { color: white; }
        .cart-item-price {
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 14px;
        }
        .cart-item-ctrl {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .cart-item-ctrl button {
            background: #eee;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        body.dark-theme .cart-item-ctrl button { background: #34495e; color: white; }
        .cart-item-ctrl button:hover {
            background: var(--secondary-color);
            color: white;
        }
        .cart-drawer-footer {
            padding: 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
        body.dark-theme .cart-drawer-footer { background: #1a252f; border-top-color: #34495e; }
        .cart-total-price {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 15px;
            color: var(--primary-color);
        }
        body.dark-theme .cart-total-price { color: white; }
        .checkout-btn {
            width: 100%;
            padding: 12px;
            background-color: #25d366;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, background 0.2s;
        }
        .checkout-btn:hover {
            transform: translateY(-3px);
            background-color: #1ebd58;
        }
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
        }
        .cart-overlay.show {
            display: block;
        }
        .empty-cart-msg {
            text-align: center;
            color: #777;
            margin-top: 40px;
            font-size: 16px;
        }

        /* 🚀 3. زر الصعود السريع للأعلى المتطور (Scroll to Top) */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background-color: var(--secondary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1500;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
        }
        html[dir="ltr"] .scroll-top {
            right: auto;
            left: 30px;
        }
        .scroll-top.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .scroll-top:hover {
            background-color: #c0392b;
            transform: translateY(-5px);
        }

        /* الحركات البصرية والأنيميشن */
        @keyframes pulseGlow {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(231, 76, 60, 0.4)); }
            100% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(231, 76, 60, 0.8)); }
        }
        @keyframes loadingBar {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* تجاوب الشاشات (Responsive) - التعديلات الجذرية للهاتف */
        @media (max-width: 768px) {
            header {
                padding: 10px 4%;
            }
            .logo {
                font-size: 18px;
            }
            .lang-toggle {
                font-size: 12px;
                padding: 4px 10px;
            }
            .theme-toggle, .cart-icon {
                font-size: 20px;
            }
            .header-controls {
                gap: 12px;
            }

            .category-header {
                padding: 20px 5%;
                margin-bottom: 20px;
            }
            .category-header h1 {
                font-size: 24px;
            }
            .category-header p {
                font-size: 14px;
            }
            .controls {
                margin-bottom: 25px;
            }
            .search-box input {
                padding: 10px 15px;
                font-size: 14px;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 0 4% 50px;
            }

            .product-image {
                height: 130px;
            }
            
            .product-info {
                padding: 12px 8px;
            }

            .product-title {
                font-size: 13px;
                margin-bottom: 8px;
            }

            .product-price {
                font-size: 15px;
                margin-bottom: 12px;
            }

            .add-to-cart-btn {
                font-size: 11px;
                padding: 6px;
                gap: 5px;
                border-width: 1.5px;
            }
            .add-to-cart-btn i {
                font-size: 12px;
            }

            .cart-drawer {
                width: 65%;
                left: -65%;
            }
            html[dir="ltr"] .cart-drawer {
                right: -65%;
                left: auto;
            }
            .cart-drawer.open {
                left: 0;
            }
            html[dir="ltr"] .cart-drawer.open {
                right: 0;
                left: auto;
            }

            .cart-drawer-header {
                padding: 15px;
            }
            .cart-drawer-header h2 {
                font-size: 16px;
            }
            .cart-item {
                gap: 10px;
            }
            .cart-item img {
                width: 50px;
                height: 50px;
            }
            .cart-item-title {
                font-size: 13px;
            }
            .cart-item-price {
                font-size: 13px;
            }
            .cart-total-price {
                font-size: 16px;
            }
            .checkout-btn {
                font-size: 13px;
                padding: 10px;
            }
        }

        @media (max-width: 380px) {
            .product-image {
                height: 110px;
            }
            .product-title {
                font-size: 11px;
            }
            .add-to-cart-btn {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <i class="fa-solid fa-book-open-reader splash-logo"></i>
            <h1 class="splash-title" id="splashTitle">مكتبة البيان</h1>
            <div class="splash-loader"></div>
        </div>
    </div>

    <header>
        <a href="index.html" class="logo" id="headerLogo"><i class="fa-solid fa-book-open-reader"></i> مكتبة البيان</a>
        
        <div class="header-controls">
            <div class="lang-toggle" id="langToggleBtn" title="تغيير اللغة / Switch Language">
                <i class="fa-solid fa-language"></i>
                <span id="langText">English</span>
            </div>

            <div class="theme-toggle" id="themeToggleBtn" title="تبديل مظهر الموقع">
                <i class="fa-solid fa-moon"></i>
            </div>
            
            <div class="cart-icon" id="cartToggleBtn">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-drawer-header">
            <h2 id="cartDrawerTitle">سلة المشتريات</h2>
            <i class="fa-solid fa-xmark close-cart" id="closeCartBtn"></i>
        </div>
        <div class="cart-drawer-items" id="cartDrawerItems">
            </div>
        <div class="cart-drawer-footer">
            <div class="cart-total-price">
                <span id="cartTotalLabel">الإجمالي:</span>
                <span id="cartTotalAmount">0 ج.س</span>
            </div>
            <button class="checkout-btn" onclick="sendOrderViaWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i> <span id="checkoutBtnText">تأكيد الطلب عبر الواتساب</span>
            </button>
        </div>
    </div>

    <div class="scroll-top" id="scrollTopBtn" title="الصعود للأعلى">
        <i class="fa-solid fa-arrow-up"></i>
    </div>

    <section class="category-header">
        <h1 id="catHeaderTitle">قسم الكتب والمذكرات</h1>
        <p id="catHeaderDesc">مجموعة واسعة من الكتب الثقافية، العلمية، والمذكرات الأكاديمية والمدرسية.</p>
    </section>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن كتاب أو مذكرات (مثال: رواية، مذكرة علوم، قاموس)...">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <div class="products-grid" id="productsGrid"></div>

            "en": {
                "splashTitle": "Al-Bayan Library",
                "headerLogo": "<i class='fa-solid fa-book-open-reader'></i> Al-Bayan Library",
                "langText": "العربية",
                "cartDrawerTitle": "Shopping Cart",
                "cartTotalLabel": "Total:",
                "checkoutBtnText": "Confirm Order via WhatsApp",
                "catHeaderTitle": "Books & Notes Section",
                "catHeaderDesc": "A wide range of cultural, scientific, academic, and school notes.",
                "searchPlaceholder": "Search for a book or notes (e.g., novel, dictionary)...",
                "addToCartBtn": "<i class='fa-solid fa-cart-plus'></i> Add to Cart",
                "emptyCartMsg": "Your shopping cart is currently empty.",
                "currency": "SDG"
            }
        };

        // إدارة الحالة العامة للسلة، المظهر، واللغة
        let cart = JSON.parse(localStorage.getItem('albayan_cart')) || [];
        let currentLang = localStorage.getItem('albayan_lang') || 'ar';
        let booksProductsDatabase = []; // مصفوفة المنتجات السحابية الديناميكية
        
        const cartCountElement = document.getElementById('cartCount');
        const cartDrawer = document.getElementById('cartDrawer');
        const cartOverlay = document.getElementById('cartOverlay');
        const cartToggleBtn = document.getElementById('cartToggleBtn');
        const closeCartBtn = document.getElementById('closeCartBtn');
        const cartDrawerItems = document.getElementById('cartDrawerItems');
        const cartTotalAmount = document.getElementById('cartTotalAmount');

        // 🎬 إخفاء الشاشة الترحيبية
        setTimeout(() => {
            document.getElementById('splashScreen').classList.add('fade-out');
        }, 2000);

        // 🌗 إدارة الوضع الداكن
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = themeToggleBtn.querySelector('i');
        
        if (localStorage.getItem('albayan_theme') === 'dark') {
            document.body.classList.add('dark-theme');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            if (document.body.classList.contains('dark-theme')) {
                localStorage.setItem('albayan_theme', 'dark');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                localStorage.setItem('albayan_theme', 'light');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        });

        // 🚀 زر الصعود السريع
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        });
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 🌐 معالجة تطبيق اللغة والترجمة للواجهات
        window.applyLanguage = function(lang) {
            currentLang = lang;
            localStorage.setItem('albayan_lang', lang);
            
            if (lang === 'en') {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
            } else {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            }

            const dict = localizationDictionary[lang];
            document.getElementById('splashTitle').innerText = dict.splashTitle;
            document.getElementById('headerLogo').innerHTML = dict.headerLogo;
            document.getElementById('langText').innerText = dict.langText;
            document.getElementById('cartDrawerTitle').innerText = dict.cartDrawerTitle;
            document.getElementById('cartTotalLabel').innerText = dict.cartTotalLabel;
            document.getElementById('checkoutBtnText').innerText = dict.checkoutBtnText;
            document.getElementById('catHeaderTitle').innerText = dict.catHeaderTitle;
            document.getElementById('catHeaderDesc').innerText = dict.catHeaderDesc;
            document.getElementById('searchInput').placeholder = dict.searchPlaceholder;

            renderProducts();
            updateCartUI();
        }

        langToggleBtn.addEventListener('click', () => {
            let targetLang = currentLang === 'ar' ? 'en' : 'ar';
            applyLanguage(targetLang);
        });

        // 📥 الاتصال بـ Cloud Firestore وجلب منتجات "قسم الكتب والمذكرات" فقط حياً وبشكل تلقائي
        const q = query(collection(db, "Products"), where("category", "==", "قسم الكتب والمذكرات"));
        
        onSnapshot(q, (snapshot) => {
            booksProductsDatabase = [];
            snapshot.forEach((doc) => {
                booksProductsDatabase.push(doc.data());
            });
            renderProducts(); // تحديث رسم المنتجات على الشاشة فور حدوث تغيير
        });

        // دالة توليد ورسم كروت المنتجات من Firestore
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = ''; 
            const dict = localizationDictionary[currentLang];

            if (booksProductsDatabase.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #777;">جاري سحب المنتجات من السحابة أو لا تتوفر منتجات حالياً...</div>`;
                return;
            }

            booksProductsDatabase.forEach(product => {
                const productName = currentLang === 'ar' ? (product.nameAr || product.name) : (product.nameEn || product.name);
                grid.innerHTML += `
                    <div class="product-card" data-name="${productName}">
                        <div class="product-image">
                            <img src="${product.img}" alt="${productName}" onerror="this.src='https://images.unsplash.com/photo-1543002588-bfa74002ed7e?w=500'">
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${productName}</h3>
                            <div class="product-price">${Number(product.price).toLocaleString()} ${dict.currency}</div>
                            <button class="add-to-cart-btn" onclick="addToCart('${product.nameAr || product.name}', '${product.nameEn || ''}', ${product.price}, '${product.img}')">
                                ${dict.addToCartBtn}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // تحديث السلة وإعداد الحسابات التفاعلية
        window.updateCartUI = function() {
            let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            cartCountElement.innerText = totalItems;
            cartCountElement.classList.add('bump');
            setTimeout(() => cartCountElement.classList.remove('bump'), 300);

            cartDrawerItems.innerHTML = '';
            const dict = localizationDictionary[currentLang];

            if(cart.length === 0) {
                cartDrawerItems.innerHTML = `<div class="empty-cart-msg">${dict.emptyCartMsg}</div>`;
                cartTotalAmount.innerText = `0 ${dict.currency}`;
                return;
            }

            let totalMoney = 0;
            cart.forEach((item, index) => {
                totalMoney += item.price * item.qty;
                const itemName = currentLang === 'ar' ? (item.nameAr || item.name) : (item.nameEn || item.name);
                cartDrawerItems.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${itemName}">
                        <div class="cart-item-details">
                            <div class="cart-item-title">${itemName}</div>
                            <div class="cart-item-price">${(item.price * item.qty).toLocaleString()} ${dict.currency}</div>
                            <div class="cart-item-ctrl">
                                <button onclick="changeQty(${index}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)">+</button>
                            </div>
                        </div>
                        <i class="fa-solid fa-trash-can" style="color:#e74c3c; cursor:pointer;" onclick="changeQty(${index}, -${item.qty})"></i>
                    </div>
                `;
            });
            cartTotalAmount.innerText = `${totalMoney.toLocaleString()} ${dict.currency}`;
        }

        window.addToCart = function(nameAr, nameEn, price, img) {
            let existingItem = cart.find(item => item.nameAr === nameAr || item.name === nameAr);
            if(existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ name: nameAr, nameAr: nameAr, nameEn: nameEn, price: price, img: img, qty: 1 });
            }
            localStorage.setItem('albayan_cart', JSON.stringify(cart));
            updateCartUI();
            cartDrawer.classList.add('open');
            cartOverlay.classList.add('show');
        }

        window.changeQty = function(index, amount) {
            cart[index].qty += amount;
            if(cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            localStorage.setItem('albayan_cart', JSON.stringify(cart));
            updateCartUI();
        }

        cartToggleBtn.addEventListener('click', () => {
            cartDrawer.classList.add('open');
            cartOverlay.classList.add('show');
        });
        closeCartBtn.addEventListener('click', () => {
            cartDrawer.classList.remove('open');
            cartOverlay.classList.remove('show');
        });
        cartOverlay.addEventListener('click', () => {
            cartDrawer.classList.remove('open');
            cartOverlay.classList.remove('show');
        });

        // نظام البحث الذكي والتصفية داخل الصفحة
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const productCards = document.querySelectorAll('.product-card');
            productCards.forEach(card => {
                const productName = card.getAttribute('data-name').toLowerCase();
                if (productName.includes(searchTerm)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        window.sendOrderViaWhatsApp = function() {
            if(cart.length === 0) {
                alert(currentLang === 'ar' ? 'السلة فارغة، أضف بعض المنتجات أولاً!' : 'The cart is empty, add some products first!');
                return;
            }
            window.location.href = 'cart.html';
        }

        // تهيئة الإعدادات الأساسية عند تحميل الصفحة بالكامل
        window.addEventListener('DOMContentLoaded', () => {
            applyLanguage(currentLang);
        });
    </script>
</body>
</html>
