<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوشكا فوتوغرافي | تواصل معنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* الإعدادات الأساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary-color: #ff9800;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(17, 17, 17, 0.6); 
            --text-light: #ffffff;
        }

        body {
            /* نفس الخلفية المتدرجة الحية للتناسق */
            background: linear-gradient(-45deg, #0f0c29, #0a0a0a, #24243e, #1a1000);
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
            color: var(--text-light);
            overflow-x: hidden;
            padding-top: 50px;
            padding-bottom: 120px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- الإضافة الجديدة: اسم دوشكا PRODUCTION --- */
        .brand-name-contact {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 15px;
            /* تأثير الإضاءة النيون */
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 40px var(--primary-color);
            /* حركة النبض المستمرة */
            animation: neonPulse 2s infinite alternate, fadeInDown 0.8s ease forwards;
            display: inline-block;
            letter-spacing: 2px;
        }

        /* أنيميشن نبض الإضاءة للاسم */
        @keyframes neonPulse {
            from {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px #ff5722;
            }
            to {
                text-shadow: 0 0 20px var(--primary-color), 0 0 30px var(--primary-color), 0 0 50px #ff5722, 0 0 70px #ff5722;
            }
        }
        /* --- نهاية الإضافة الجديدة للاسم --- */

        /* عنوان الشاشة */
        .section-header {
            text-align: center;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .section-header h2 {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
            animation: fadeInDown 0.8s ease forwards;
        }

        .section-header p {
            color: #888;
            font-size: 1.2rem;
            margin-top: 10px;
            animation: fadeInDown 1s ease forwards;
        }

        /* حاوية قسم التواصل (تنقسم لقسمين في اللابتوب وقسم واحد في التلفون) */
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* قسم كروت المعلومات (يمين) */
        .contact-info {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInRight 1s ease forwards;
        }

        .info-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s ease;
        }

        /* حركة جذابة عند التمرير: بروز الكرت لليمين وتوهج */
        .info-card:hover {
            transform: translateX(-10px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 30px rgba(255, 152, 0, 0.15);
        }

        .info-card .icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 152, 0, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: var(--primary-color);
            transition: 0.4s ease;
        }

        .info-card:hover .icon {
            background: var(--primary-color);
            color: #000;
            transform: scale(1.1) rotate(10deg);
        }

        .info-card h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #fff;
        }

        .info-card p {
            color: #aaa;
            font-size: 1rem;
        }

        /* قسم فورم المراسلة (يسار) */
        .contact-form-wrapper {
            flex: 1.5;
            min-width: 300px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            animation: fadeInLeft 1s ease forwards;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #eee;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 152, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);
        }

        /* زر الإرسال الحي */
        .alive-btn {
            display: inline-block;
            width: 100%;
            padding: 15px 0;
            font-size: 1.2rem;
            font-weight: 900;
            color: #000;
            background: var(--primary-color);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .alive-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: -1;
            transition: all 0.6s ease;
        }

        .alive-btn:hover::before {
            left: 200%;
        }

        .alive-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.4);
        }

        /* قسم السوشيال ميديا */
        .social-section {
            text-align: center;
            margin-top: 60px;
            animation: fadeInUp 1s ease forwards 0.5s;
            opacity: 0;
            transform: translateY(30px);
        }

        .social-section h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* --- الإضافة الجديدة: نبض مستمر للسوشيال ميديا --- */
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s ease;
            /* تأثير النبض الجديد */
            animation: pulseSocial 2s infinite;
        }

        /* تأخير النبض عشان ينوروا ورا بعض بشكل جذاب وتم إضافة الواتساب */
        .social-btn:nth-child(1) { animation-delay: 0.2s; }
        .social-btn:nth-child(2) { animation-delay: 0.4s; }
        .social-btn:nth-child(3) { animation-delay: 0.6s; }
        .social-btn:nth-child(4) { animation-delay: 0.8s; }
        .social-btn:nth-child(5) { animation-delay: 1.0s; }

        @keyframes pulseSocial {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }
        /* --- نهاية الإضافة الجديدة --- */

        .social-btn:hover {
            background: var(--primary-color);
            color: #000;
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.5);
            border-color: var(--primary-color);
            animation: none; /* توقيف النبض لما تمرر الماوس */
        }

        /* الأنيميشنز */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* --- الزر العائم (FAB) --- */
        .fab-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 15px;
        }

        .fab-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            color: var(--dark-bg);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fab-btn:hover { transform: scale(1.1); }

        .fab-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .fab-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .fab-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #222;
            color: white;
            border: 1px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
            position: relative;
        }

        .fab-item:hover {
            background: var(--primary-color);
            color: var(--dark-bg);
            border-color: var(--primary-color);
        }

        .fab-item::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .fab-item:hover::after { opacity: 1; }

        /* شاشات الموبايل */
        @media (max-width: 768px) {
            .brand-name-contact { font-size: 2.2rem; } /* تصغير الاسم في الجوال */
            .section-header h2 { font-size: 2.2rem; }
            .contact-form-wrapper { padding: 25px; }
            .fab-container { bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <section class="section-header">
        <!-- الإضافة الجديدة: اسم دوشكا برودكشن -->
        <div class="brand-name-contact">دوشكا PRODUCTION</div>
        
        <h2>تواصل معنا</h2>
        <p>نحن هنا لتحويل أفكارك ولحظاتك إلى صور لا تُنسى</p>
    </section>

    <main class="contact-container">
        
        <!-- كروت المعلومات السريعة -->
        <div class="contact-info">
            <div class="info-card">
                <div class="icon"><i class="fab fa-whatsapp"></i></div>
                <div>
                    <h4>واتساب</h4>
                    <p dir="ltr">0112063113</p>
                </div>
            </div>

            <div class="info-card">
                <div class="icon"><i class="fas fa-phone-alt"></i></div>
                <div>
                    <h4>اتصل بنا</h4>
                    <p dir="ltr">0905161222</p>
                </div>
            </div>

            <div class="info-card">
                <div class="icon"><i class="fas fa-envelope"></i></div>
                <div>
                    <h4>البريد الإلكتروني</h4>
                    <p>iamjoker2017@gmail.com</p>
                </div>
            </div>

            <div class="info-card">
                <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                <div>
                    <h4>الموقع</h4>
                    <p>السودان - عطبرة</p>
                </div>
            </div>
        </div>

        <!-- فورم إرسال الرسالة -->
        <div class="contact-form-wrapper">
            <form id="contactForm">
                <div class="form-group">
                    <label>الاسم رباعي</label>
                    <input type="text" placeholder="اكتب اسمك..." required>
                </div>

                <div class="form-group">
                    <label>البريد الإلكتروني أو الهاتف</label>
                    <input type="text" placeholder="كيف نقدر نرد عليك؟" required>
                </div>

                <div class="form-group">
                    <label>تفاصيل الحجز</label>
                    <input type="text" placeholder="مثال: استفسار عن باقة الأعراس" required>
                </div>

                <div class="form-group">
                    <label>تفاصيل اضافية</label>
                    <textarea rows="4" placeholder="اكتب تفاصيل استفسارك هنا..." required></textarea>
                </div>

                <button type="submit" class="alive-btn">
                    <i class="fas fa-paper-plane"></i> ارسال الحجز
                </button>
            </form>
        </div>

    </main>

    <!-- أيقونات السوشيال ميديا مع الروابط الجديدة -->
    <div class="social-section">
        <h3>تابع أعمالنا على المنصات:</h3>
        <div class="social-icons">
            <a href="https://www.instagram.com/invites/contact/?utm_source=ig_contact_invite&utm_medium=copy_link&utm_content=58arft7" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1CwFfnnpum/" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://vm.tiktok.com/ZS9j9uJabUC84-nmkFa/" target="_blank" class="social-btn"><i class="fab fa-tiktok"></i></a>
            <a href="https://x.com/OS_Dooshka" target="_blank" class="social-btn"><i class="fab fa-twitter"></i></a>
            <!-- تم إضافة أيقونة الواتساب هنا -->
            <a href="https://wa.me/249112063113" target="_blank" class="social-btn"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <!-- الزر العائم للربط التام بين الشاشات -->
    <div class="fab-container">
        <button class="fab-btn" id="fabToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="fab-menu" id="fabMenu">
            <!-- الصفحة الحالية -->
            <a href="contact.html" class="fab-item" data-tooltip="تواصل معنا" style="color: var(--primary-color);">
                <i class="fas fa-envelope"></i>
            </a>
            <!-- الربط مع شاشة الخدمات -->
            <a href="services.html" class="fab-item" data-tooltip="الخدمات والأسعار">
                <i class="fas fa-tags"></i>
            </a>
            <!-- الربط مع شاشة المعرض -->
            <a href="portfolio.html" class="fab-item" data-tooltip="معرض الأعمال">
                <i class="fas fa-images"></i>
            </a>
            <!-- الربط مع الرئيسية -->
            <a href="index.html" class="fab-item" data-tooltip="الرئيسية">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </div>

    <script>
        // تفعيل قائمة الزر العائم (FAB)
        const fabToggle = document.getElementById('fabToggle');
        const fabMenu = document.getElementById('fabMenu');
        const fabIcon = fabToggle.querySelector('i');

        fabToggle.addEventListener('click', () => {
            fabMenu.classList.toggle('active');
            if(fabMenu.classList.contains('active')) {
                fabIcon.classList.remove('fa-bars');
                fabIcon.classList.add('fa-times');
                fabToggle.style.transform = 'rotate(90deg)';
            } else {
                fabIcon.classList.remove('fa-times');
                fabIcon.classList.add('fa-bars');
                fabToggle.style.transform = 'rotate(0deg)';
            }
        });

        // إغلاق قائمة الزر العائم عند الضغط خارجها
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.fab-container') && fabMenu.classList.contains('active')) {
                fabMenu.classList.remove('active');
                fabIcon.classList.remove('fa-times');
                fabIcon.classList.add('fa-bars');
                fabToggle.style.transform = 'rotate(0deg)';
            }
        });

        // تأثير التموج وبرمجة إرسال الفورم
        const submitBtn = document.querySelector('.alive-btn');
        const form = document.getElementById('contactForm');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // منع تحديث الصفحة الفعلي
            
            // عمل تأثير التموج عند الضغط
            let rect = submitBtn.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;
            
            let ripples = document.createElement('span');
            ripples.style.left = x + 'px';
            ripples.style.top = y + 'px';
            ripples.style.position = 'absolute';
            ripples.style.background = 'rgba(255,255,255,0.5)';
            ripples.style.width = '100px';
            ripples.style.height = '100px';
            ripples.style.borderRadius = '50%';
            ripples.style.transform = 'translate(-50%, -50%)';
            ripples.style.pointerEvents = 'none';
            ripples.style.animation = 'rippleEffect 0.6s linear';
            
            submitBtn.appendChild(ripples);
            
            setTimeout(() => {
                ripples.remove();
                alert('تم إرسال رسالتك بنجاح، فريق دوشكا هيتواصل معاك قريب جداً!');
                form.reset(); // تفريغ الحقول
            }, 500);
        });
    </script>
    
    <style>
        @keyframes rippleEffect {
            0% { width: 0; height: 0; opacity: 0.5; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }
    </style>

</body>
</html>
