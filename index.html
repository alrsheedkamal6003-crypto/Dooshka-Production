<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو العدسة | للتصوير الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* الإعدادات الأساسية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary-color: #ff9800; /* لون برتقالي/ذهبي يعطي طابع الفخامة */
            --dark-bg: #0a0a0a;
            --text-light: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* تنسيق قسم الواجهة (Hero Section) */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* خلفية الفيديو */
        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            z-index: -2;
            object-fit: cover;
        }

        /* طبقة شفافة فوق الفيديو عشان الكلام يظهر بوضوح */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        /* المحتوى داخل الواجهة */
        .hero-content {
            z-index: 1;
            padding: 0 20px;
        }

        /* --- الإضافة الجديدة: تنسيق اسم المصور (دوشكا فوتوغرافي) --- */
        .brand-name {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffffff;
            margin-bottom: 10px;
            /* تأثير الإضاءة النيون */
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 40px var(--primary-color);
            /* حركة الدخول وحركة النبض المستمرة */
            animation: slideDownBrand 1s ease forwards, neonPulse 2s infinite alternate 1s;
            opacity: 0;
            transform: translateY(-50px);
        }

        /* أنيميشن نزول الاسم من الأعلى */
        @keyframes slideDownBrand {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* أنيميشن نبض الإضاءة (حركة مستمرة) */
        @keyframes neonPulse {
            from {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color), 0 0 30px #ff5722;
            }
            to {
                text-shadow: 0 0 20px var(--primary-color), 0 0 30px var(--primary-color), 0 0 50px #ff5722, 0 0 70px #ff5722;
            }
        }
        /* --- نهاية الإضافة الجديدة --- */

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 0.5s;
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #ddd;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 0.8s;
        }

        /* زر مضيء (Glow Button) يعطي إحساس التصوير والعدسات */
        .glow-btn {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 1.1s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .glow-btn:hover {
            background: var(--primary-color);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--primary-color), 0 0 40px var(--primary-color);
        }

        /* أنيميشن الدخول */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- الزر العائم والقائمة (Floating Action Button) --- */
        .fab-container {
            position: fixed;
            bottom: 30px;
            left: 30px; /* على اليسار في الواجهة العربية */
            z-index: 100;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 15px;
        }

        .fab-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            color: var(--dark-bg);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fab-btn:hover {
            transform: scale(1.1);
        }

        .fab-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .fab-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .fab-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #222;
            color: white;
            border: 1px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
            position: relative;
        }

        .fab-item:hover {
            background: var(--primary-color);
            color: var(--dark-bg);
            border-color: var(--primary-color);
        }

        /* تلميح اسم الشاشة (Tooltip) */
        .fab-item::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .fab-item:hover::after {
            opacity: 1;
        }

        /* التجاوب مع شاشات الهواتف (Responsive) */
        @media (max-width: 768px) {
            .brand-name { font-size: 3rem; } /* تصغير الاسم في الجوال */
            .hero-content h1 { font-size: 2.5rem; }
            .hero-content p { font-size: 1.1rem; }
            .fab-container { bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <video autoplay loop muted playsinline class="bg-video">
            <!-- لتغيير الفيديو، استبدل الرابط أدناه بمسار الفيديو الخاص بك -->
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            متصفحك لا يدعم عرض الفيديو.
        </video>
        
        <div class="overlay"></div>

        <div class="hero-content">
            <!-- الإضافة الجديدة: اسم المصور -->
            <div class="brand-name">دوشكا فوتوغرافي</div>
            
            <h1>وثّق أجمل لحظاتك</h1>
            <p>إبداع في التفاصيل، واحترافية في إظهار جمالك من كل زاوية</p>
            <button class="glow-btn">
                <i class="fas fa-camera-retro"></i> احجز جلستك الآن
            </button>
        </div>
    </header>

    <div class="fab-container">
        <button class="fab-btn" id="fabToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="fab-menu" id="fabMenu">
            <a href="#" class="fab-item" data-tooltip="تواصل معنا">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="#" class="fab-item" data-tooltip="الخدمات والأسعار">
                <i class="fas fa-tags"></i>
            </a>
            <!-- التعديل المطلوب هنا: تم توجيه الرابط لملف portfolio.html -->
            <a href="portfolio.html" class="fab-item" data-tooltip="معرض الأعمال">
                <i class="fas fa-images"></i>
            </a>
            <!-- تم تعديل رابط الرئيسية للرجوع للصفحة نفسها أو تحديثها -->
            <a href="index.html" class="fab-item" data-tooltip="الرئيسية">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </div>

    <script>
        // تفعيل حركة الزر العائم (FAB)
        const fabToggle = document.getElementById('fabToggle');
        const fabMenu = document.getElementById('fabMenu');
        const fabIcon = fabToggle.querySelector('i');

        fabToggle.addEventListener('click', () => {
            // التبديل بين إظهار وإخفاء القائمة
            fabMenu.classList.toggle('active');
            
            // تغيير الأيقونة لما تفتح وتقفل القائمة
            if(fabMenu.classList.contains('active')) {
                fabIcon.classList.remove('fa-bars');
                fabIcon.classList.add('fa-times');
                fabToggle.style.transform = 'rotate(90deg)';
            } else {
                fabIcon.classList.remove('fa-times');
                fabIcon.classList.add('fa-bars');
                fabToggle.style.transform = 'rotate(0deg)';
            }
        });

        // إغلاق القائمة في حال الضغط في أي مكان آخر في الشاشة
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.fab-container') && fabMenu.classList.contains('active')) {
                fabMenu.classList.remove('active');
                fabIcon.classList.remove('fa-times');
                fabIcon.classList.add('fa-bars');
                fabToggle.style.transform = 'rotate(0deg)';
            }
        });
    </script>

</body>
</html>
