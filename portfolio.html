<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دوشكا فوتوغرافي | معرض الأعمال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* الإعدادات الأساسية وضمان عدم تداخل الكلمات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary-color: #ff9800;
            --dark-bg: #0a0a0a;
            --card-bg: #121212;
            --text-light: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
            padding-top: 40px;
        }

        /* عنوان الشاشة مع تأثير النيون الهادئ */
        .section-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .section-header h2 {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
            animation: fadeInDown 0.8s ease forwards;
        }

        .section-header p {
            color: #888;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* أزرار الفلترة (شغل الفلاش والعدسات) */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .filter-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #333;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.3);
            transform: translateY(-3px);
        }

        /* شبكة المعرض المتجاوبة 100% للابتوب والتلفون */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 40px 100px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* كرت العمل (صورة أو فيديو) */
        .gallery-item {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #222;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUpItem 0.6s ease forwards;
        }

        .gallery-item:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 152, 0, 0.2);
            border-color: var(--primary-color);
        }

        /* صندوق الميديا */
        .media-box {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: #000;
        }

        .media-box img, .media-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .media-box img {
            transform: scale(1.1);
        }

        /* تأثير فلاش الكاميرا عند الحوم فوق الكرت */
        .media-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .gallery-item:hover .media-box::after {
            animation: cameraFlash 0.4s ease-out;
        }

        /* تفاصيل الكرت تحت الميديا */
        .item-info {
            padding: 20px;
            background: var(--card-bg);
        }

        .item-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .item-info p {
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        /* أيقونة تشغيل الفيديوهات مع النبض الضوئي */
        .video-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 152, 0, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            z-index: 2;
            box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.5);
            animation: pulseLight 1.5s infinite;
        }

        /* الأنيميشنز */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUpItem {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cameraFlash {
            0% { opacity: 0; }
            20% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        @keyframes pulseLight {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }

        /* --- الزر العائم (FAB) المتوافق تماماً --- */
        .fab-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 15px;
        }

        .fab-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-color);
            color: var(--dark-bg);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fab-btn:hover { transform: scale(1.1); }

        .fab-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .fab-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .fab-item {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #222;
            color: white;
            border: 1px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
            position: relative;
        }

        .fab-item:hover {
            background: var(--primary-color);
            color: var(--dark-bg);
            border-color: var(--primary-color);
        }

        .fab-item::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .fab-item:hover::after { opacity: 1; }

        /* شاشات الموبايل لضمان الكفاءة ومنع التداخل */
        @media (max-width: 768px) {
            .section-header h2 { font-size: 2rem; }
            .gallery-grid { padding: 0 15px 100px 15px; gap: 15px; }
            .fab-container { bottom: 20px; left: 20px; }
            .media-box { height: 200px; }
        }
    </style>
</head>
<body>

    <section class="section-header">
        <h2>معرض إبداعات دوشكا</h2>
        <p>مجموعة مختارة من الجلسات واللحظات التي لا تُنسى</p>
    </section>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterMedia('all')">الكل</button>
        <button class="filter-btn" onclick="filterMedia('photo')">جلسات تصوير</button>
        <button class="filter-btn" onclick="filterMedia('video')">أعمال الڤيديو</button>
    </div>

    <main class="gallery-grid">
        
        <div class="gallery-item" data-category="photo">
            <div class="media-box">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500" alt="جلسة زفاف">
            </div>
            <div class="item-info">
                <h3>جلسة زفاف ملكية</h3>
                <p><i class="fas fa-camera"></i> تصوير خارجي / إضاءة طبيعية</p>
            </div>
        </div>

        <div class="gallery-item" data-category="video">
            <div class="media-box">
                <div class="video-overlay"><i class="fas fa-play"></i></div>
                <video muted loop playsinline preload="metadata">
                    <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
                </video>
            </div>
            <div class="item-info">
                <h3>فيديو سينمائي خلف الكواليس</h3>
                <p><i class="fas fa-video"></i> دقة 4K / تعديل ألوان</p>
            </div>
        </div>

        <div class="gallery-item" data-category="photo">
            <div class="media-box">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500" alt="بورتريه">
            </div>
            <div class="item-info">
                <h3>تصوير بورتريه شخصي</h3>
                <p><i class="fas fa-camera"></i> استوديو داخلي / فلاش أحادي</p>
            </div>
        </div>

        <div class="gallery-item" data-category="video">
            <div class="media-box">
                <div class="video-overlay"><i class="fas fa-play"></i></div>
                <video muted loop playsinline preload="metadata">
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                </video>
            </div>
            <div class="item-info">
                <h3>إعلان تجاري لمنتجات</h3>
                <p><i class="fas fa-video"></i> تصوير بطيء / إضاءة نيون</p>
            </div>
        </div>

    </main>

    <div class="fab-container">
        <button class="fab-btn" id="fabToggle">
            <i class="fas fa-bars"></i>
        </button>
        
        <div class="fab-menu" id="fabMenu">
            <a href="#" class="fab-item" data-tooltip="تواصل معنا">
                <i class="fas fa-envelope"></i>
            </a>
            <!-- التعديل هنا: تم تغيير علامة # إلى services.html لربط الشاشة الثالثة -->
            <a href="services.html" class="fab-item" data-tooltip="الخدمات والأسعار">
                <i class="fas fa-tags"></i>
            </a>
            <a href="portfolio.html" class="fab-item" data-tooltip="معرض الأعمال" style="color: var(--primary-color);">
                <i class="fas fa-images"></i>
            </a>
            <a href="index.html" class="fab-item" data-tooltip="الرئيسية">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </div>

    <script>
        // تفعيل قائمة الزر العائم (FAB)
        const fabToggle = document.getElementById('fabToggle');
        const fabMenu = document.getElementById('fabMenu');
        const fabIcon = fabToggle.querySelector('i');

        fabToggle.addEventListener('click', () => {
            fabMenu.classList.toggle('active');
            if(fabMenu.classList.contains('active')) {
                fabIcon.classList.remove('fa-bars');
                fabIcon.classList.add('fa-times');
                fabToggle.style.transform = 'rotate(90deg)';
            } else {
                fabIcon.classList.remove('fa-times');
                fabIcon.classList.add('fa-bars');
                fabToggle.style.transform = 'rotate(0deg)';
            }
        });

        // تشغيل وإيقاف الفيديو بشكل تفاعلي عند الحوم فوق كرت الفيديو
        const videoCards = document.querySelectorAll('.gallery-item[data-category="video"]');
        videoCards.forEach(card => {
            const video = card.querySelector('video');
            const overlay = card.querySelector('.video-overlay');
            
            card.addEventListener('mouseenter', () => {
                video.play();
                overlay.style.opacity = '0'; // إخفاء زر التشغيل بنعومة أثناء العرض
            });
            
            card.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0; // إعادة الفيديو للبداية
                overlay.style.opacity = '1';
            });
        });

        // نظام الفلترة الذكي لعرض الصور أو الفيديوهات
        function filterMedia(category) {
            // تحديث تصميم أزرار الفلترة
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // إخفاء وإظهار الكروت بأنيميشن مريح للعين
            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.style.display = 'block';
                    item.style.animation = 'none';
                    setTimeout(() => {
                        item.style.animation = 'fadeInUpItem 0.4s ease forwards';
                    }, 10);
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // إغلاق قائمة الزر العائم عند الضغط خارجها
        document.addEventListener('click', (event) => {
            if (!event.target.closest('.fab-container') && fabMenu.classList.contains('active')) {
                fabMenu.classList.remove('active');
                fabIcon.classList.remove('fa-times');
                fabIcon.classList.add('fa-bars');
                fabToggle.style.transform = 'rotate(0deg)';
            }
        });
    </script>

</body>
</html>
